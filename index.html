<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<title>Chand Raat Mubarak</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0b0f2f, #000);
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  color: white;
  text-align: center;
}

/* Moon */
.moon {
  position: absolute;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: 150px;
  background: gold;
  border-radius: 50%;
  box-shadow: 0 0 40px gold;
}

/* Text */
.text {
  position: absolute;
  top: 250px;
  width: 100%;
  font-size: 40px;
  color: gold;
  text-shadow: 0 0 20px gold;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px gold; }
  to { text-shadow: 0 0 30px gold; }
}

/* Stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  animation: blink 2s infinite;
}

@keyframes blink {
  0%,100% { opacity: 0; }
  50% { opacity: 1; }
}

/* Fireworks */
.firework {
  position: absolute;
  width: 5px;
  height: 5px;
  background: red;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  from {
    transform: scale(1);
    opacity: 1;
  }
  to {
    transform: scale(20);
    opacity: 0;
  }
}

</style>
</head>

<body>

<div class="moon"></div>

<div class="text">
  ✨ Chand Raat Mubarak my little life 💖 ✨ <br>
  💖 Zuzuu 💖
</div>

<script>

// Stars generate
for(let i=0;i<80;i++){
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random()*100+"vh";
  star.style.left = Math.random()*100+"vw";
  star.style.animationDelay = Math.random()*2+"s";
  document.body.appendChild(star);
}

// Fireworks
setInterval(()=>{
  let fw = document.createElement("div");
  fw.className = "firework";
  fw.style.top = Math.random()*80+"vh";
  fw.style.left = Math.random()*100+"vw";
  fw.style.background = `hsl(${Math.random()*360},100%,50%)`;
  document.body.appendChild(fw);

  setTimeout(()=> fw.remove(),1000);
},500);

</script>

</body>
</html>
